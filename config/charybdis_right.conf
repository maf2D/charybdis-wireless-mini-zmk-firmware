## SPI bus required by the PMW3610 sensor
CONFIG_SPI=y

## Zephyr input subsystem
CONFIG_INPUT=y

## ZMK pointing device support
CONFIG_ZMK_POINTING=y

## PMW3610 alt driver (fixes trackball not recovering after deep sleep)
CONFIG_PMW3610_ALT=y

