## Split keyboards
## https://zmk.dev/docs/config/system#split-keyboards
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

## Display Configuratoin
## https://zmk.dev/docs/config/displays
# CONFIG_ZMK_DISPLAY=n

# ## Track words per minute
# CONFIG_ZMK_WPM=y


## SPI bus required by the PMW3610 sensor
CONFIG_SPI=y

## Zephyr input subsystem (auto-selects the built-in pixart,pmw3610 driver via DTS)
CONFIG_INPUT=y

## ZMK pointing device support
CONFIG_ZMK_POINTING=y
